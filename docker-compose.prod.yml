services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: resiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resiq_dev}
      POSTGRES_DB: ${POSTGRES_DB:-resiq_crm}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: resiq-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

  # ResiQ Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resiq-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-resiq}:${POSTGRES_PASSWORD:-resiq_dev}@postgres:5432/${POSTGRES_DB:-resiq_crm}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.resiq.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.resiq.entrypoints=websecure"
      - "traefik.http.routers.resiq.tls.certresolver=letsencrypt"
      - "traefik.http.services.resiq.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik"
    networks:
      - resiq-network
      - traefik

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  resiq-network:
    driver: bridge
  # Connect to Traefik's network (already running on Hostinger VPS)
  traefik:
    external: true
