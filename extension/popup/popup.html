<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResiQ CRM Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1F2937;
      background: #F9FAFB;
      width: 320px;
      padding: 20px;
    }
    .logo { text-align: center; margin-bottom: 12px; }
    .logo svg { width: 32px; height: 32px; }
    h1 { font-size: 15px; text-align: center; color: #0D1F40; margin-bottom: 4px; }
    .subtitle { font-size: 11px; text-align: center; color: #6B7280; margin-bottom: 16px; }
    .status { text-align: center; padding: 12px; }
    .status.connected { color: #10B981; }
    .status.disconnected { color: #6B7280; }
    .mini-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: #0FA882;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .mini-btn:hover { background: #0D8B6E; }
    .mini-btn.secondary {
      background: #F3F4F6;
      color: #374151;
      border: 1px solid #E5E7EB;
    }
    .mini-btn.secondary:hover { background: #E5E7EB; }
    .error {
      padding: 8px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 6px;
      color: #EF4444;
      font-size: 11px;
      margin-top: 8px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 128 128" fill="none">
      <rect width="128" height="128" rx="24" fill="#0D1F40"/>
      <path d="M36 44h56v8l-28 20L36 52v-8z" fill="#0FA882"/>
      <path d="M36 52v32h56V52l-28 20L36 52z" fill="#0D8B6E"/>
    </svg>
  </div>
  <h1>ResiQ CRM</h1>
  <p class="subtitle">Gmail Extension</p>
  <div id="auth-status" class="status">
    <p>Checking connection...</p>
  </div>
  <div id="error-box" class="error hidden"></div>
  <button id="open-sidebar" class="mini-btn hidden">Open Gmail Sidebar</button>
  <button id="login-btn" class="mini-btn hidden">Sign In</button>
  <button id="logout-btn" class="mini-btn secondary hidden">Disconnect</button>

  <script>
    const els = {
      status: document.getElementById('auth-status'),
      errorBox: document.getElementById('error-box'),
      openSidebar: document.getElementById('open-sidebar'),
      loginBtn: document.getElementById('login-btn'),
      logoutBtn: document.getElementById('logout-btn'),
    };

    async function check() {
      try {
        const result = await chrome.runtime.sendMessage({ action: 'CHECK_AUTH' });
        if (result.authenticated) {
          els.status.innerHTML = `<p class="connected">✅ Connected as <strong>${result.user?.name || result.user?.email || ''}</strong></p>`;
          els.openSidebar.classList.remove('hidden');
          els.logoutBtn.classList.remove('hidden');
          els.loginBtn.classList.add('hidden');
        } else {
          els.status.innerHTML = '<p class="disconnected">Not connected to CRM</p>';
          els.loginBtn.classList.remove('hidden');
          els.openSidebar.classList.add('hidden');
          els.logoutBtn.classList.add('hidden');
        }
      } catch (err) {
        els.status.innerHTML = '<p class="disconnected">Extension not ready</p>';
      }
    }

    els.openSidebar.addEventListener('click', async () => {
      const tabs = await chrome.tabs.query({ url: '*://mail.google.com/*' });
      if (tabs.length > 0) {
        await chrome.sidePanel.open({ windowId: tabs[0].windowId });
        window.close();
      } else {
        els.errorBox.textContent = 'Open Gmail first, then try again.';
        els.errorBox.classList.remove('hidden');
      }
    });

    els.loginBtn.addEventListener('click', async () => {
      const tabs = await chrome.tabs.query({ url: '*://mail.google.com/*' });
      if (tabs.length > 0) {
        await chrome.sidePanel.open({ windowId: tabs[0].windowId });
        window.close();
      } else {
        els.errorBox.textContent = 'Open Gmail first, then click Sign In in the sidebar.';
        els.errorBox.classList.remove('hidden');
      }
    });

    els.logoutBtn.addEventListener('click', async () => {
      await chrome.runtime.sendMessage({ action: 'LOGOUT' });
      check();
    });

    check();
  </script>
</body>
</html>
