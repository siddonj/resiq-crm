name: Outbound Workflow CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  outbound-workflow:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: resiq
          POSTGRES_PASSWORD: resiq_dev
          POSTGRES_DB: resiq_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resiq -d resiq_crm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix server
          npm ci --prefix client

      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          NODE_ENV=test
          PORT=5000
          DATABASE_URL=postgresql://resiq:resiq_dev@localhost:5432/resiq_crm
          REDIS_URL=redis://localhost:6379
          POSTGRES_USER=resiq
          POSTGRES_PASSWORD=resiq_dev
          POSTGRES_DB=resiq_crm
          JWT_SECRET=ci_jwt_secret_for_outbound_workflow_checks
          ENCRYPTION_KEY=1234567890abcdef1234567890abcdef
          OUTBOUND_DAILY_EMAIL_SEND_LIMIT=100
          OUTBOUND_DAILY_LINKEDIN_SEND_LIMIT=100
          EOF

      - name: Static checks
        run: |
          node --check server/src/routes/outboundAutomation.js
          node --check scripts/outbound-smoke-test.js

      - name: Client build
        run: npm run build --prefix client

      - name: Outbound smoke test
        run: npm run test:outbound-smoke
