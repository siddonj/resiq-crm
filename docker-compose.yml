services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: resiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resiq}
      POSTGRES_DB: ${POSTGRES_DB:-resiq_crm}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: resiq-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  resiq-network:
    driver: bridge
