services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: resiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resiq_dev}
      POSTGRES_DB: ${POSTGRES_DB:-resiq_crm}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: resiq-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

  # ResiQ Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resiq-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-resiq}:${POSTGRES_PASSWORD:-resiq_dev}@postgres:5432/${POSTGRES_DB:-resiq_crm}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/webhooks/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - resiq-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: resiq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - resiq-network

  # Certbot for SSL (Let's Encrypt)
  certbot:
    image: certbot/certbot
    container_name: resiq-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    driver: local
  certbot_www:
    driver: local

networks:
  resiq-network:
    driver: bridge
