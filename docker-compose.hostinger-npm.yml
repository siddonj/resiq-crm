services:
  postgres:
    image: postgres:15-alpine
    container_name: resiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resiq_dev}
      POSTGRES_DB: ${POSTGRES_DB:-resiq_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

  redis:
    image: redis:7-alpine
    container_name: resiq-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiq-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resiq-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-resiq}:${POSTGRES_PASSWORD:-resiq_dev}@postgres:5432/${POSTGRES_DB:-resiq_crm}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - resiq-network
      - npm_proxy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  resiq-network:
    driver: bridge
  npm_proxy:
    external: true
